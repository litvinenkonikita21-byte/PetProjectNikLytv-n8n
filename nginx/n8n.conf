server {
    listen 80;
    server_name petprojectcloudlytvynenkonikita.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name petprojectcloudlytvynenkonikita.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/petprojectcloudlytvynenkonikita.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/petprojectcloudlytvynenkonikita.duckdns.org/privkey.pem;

    location / {
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        chunked_transfer_encoding off;
    }
}
